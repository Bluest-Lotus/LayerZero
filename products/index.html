---
layout: default
title: "Products"
---

<section class="catalog">
  <header class="catalog-header">
    <h1>Products</h1>
    <p>Browse our full collection.</p>
  </header>

  <div class="product-toolbar">
    <input
      type="search"
      id="product-search"
      class="search-input"
      placeholder="Search products by name or tag..."
      aria-label="Search products"
      data-scope="all"
    >
    <div class="tag-filter" id="tag-filter"></div>
  </div>

  <div class="product-grid" id="product-grid">
    {% for product in site.products %}
      <a class="product-card"
         href="{{ site.baseurl }}{{ product.url }}"
         data-title="{{ product.title | downcase }}"
         data-tags="{{ product.tags | join: ',' | downcase }}">
        <div class="product-card-image">
          <img src="{{ site.baseurl }}{{ product.thumbnail }}" alt="{{ product.title }}">
        </div>
        <div class="product-card-body">
          <h2>{{ product.title }}</h2>
          <p class="product-card-price">${{ product.price }}</p>
          <p class="product-card-summary">{{ product.summary }}</p>
        </div>
      </a>
    {% endfor %}
  </div>
</section>
