<!DOCTYPE html>
<html>
<head>
  <title>Layer0 Catalog</title>

  <link rel="stylesheet" href="assets/styles.css">

  <script defer src="assets/app.js"></script>
</head>

<body onload="loadProducts().then(renderCatalog)">

  <!-- NAV -->
  <nav>
    <strong>Layer0</strong>

    <div>
      <a href="index.html">Home</a>
      <a href="catalog.html">Catalog</a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <section class="container">

    <h1>
      Product Catalog
    </h1>

    <p>
      Browse ready-to-manufacture products built for makers,
      startups, and engineering teams.
    </p>

  </section>

  <!-- FILTERS -->
  <section class="container">

    <div class="filter-bar">

      <input
        type="text"
        placeholder="Search products..."
        oninput="searchProducts(this.value)"
      >

      <select onchange="filterByMaterial(this.value)">
        <option value="">All Materials</option>
        <option value="PLA">PLA</option>
        <option value="PETG">PETG</option>
        <option value="ABS">ABS</option>
        <option value="Nylon">Nylon</option>
      </select>

      <select onchange="filterByColor(this.value)">
        <option value="">All Colors</option>
        <option value="Black">Black</option>
        <option value="White">White</option>
        <option value="Red">Red</option>
        <option value="Blue">Blue</option>
      </select>

      <button onclick="resetFilters()">
        Reset
      </button>

    </div>

    <div
      id="catalog"
      class="grid product-grid"
    ></div>

  </section>

</body>
</html>
