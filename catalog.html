<!DOCTYPE html>
<html>
<head>
  <title>Catalog</title>
  <script defer src="./assets/app.js"></script>
</head>

<body onload="loadProducts().then(renderCatalog)">

<h1>Catalog</h1>

<input type="text" placeholder="Search..." oninput="searchProducts(this.value)" />

<select onchange="filterByMaterial(this.value)">
  <option value="">All Materials</option>
  <option value="PLA">PLA</option>
  <option value="PETG">PETG</option>
  <option value="ABS">ABS</option>
  <option value="Nylon">Nylon</option>
</select>

<select onchange="filterByColor(this.value)">
  <option value="">All Colors</option>
  <option>Black</option>
  <option>White</option>
  <option>Red</option>
  <option>Blue</option>
</select>

<button onclick="resetFilters()">Reset</button>

<div id="catalog"
     style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:1rem;">
</div>

</body>
</html>
