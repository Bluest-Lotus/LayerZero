title: "Clean Commerce"
description: "A minimalist, GitHub Pages–compatible Jekyll e‑commerce template."
url: "https://bluest-lotus.github.io"
baseurl: "/Minimalist-Ecommerce-Template-2026-"

collections:
  products:
    output: true
    permalink: /products/:name/

permalink: /:categories/:title/

markdown: kramdown
highlighter: rouge

exclude:
  - node_modules
  - vendor
  - .github

defaults:
  - scope:
      path: ""
      type: "products"
    values:
      layout: "product"

theme: null