<!DOCTYPE html>
<html>
<head>

  <title>Upload Your File</title>

  <link
    rel="stylesheet"
    href="./assets/styles.css"
  >

</head>

<body>

  <nav>

    <div class="logo">
      LayerZero
    </div>

  </nav>

  <section class="container">

    <h1 class="section-title">
      Upload Your CAD File
    </h1>

    <p class="section-subtitle">

      Upload your design,
      choose your material,
      and receive a manufacturing quote.

    </p>

    <div class="upload-box">

      <h2>
        Drop Your File Here
      </h2>

      <p>
        STL, OBJ, STEP supported
      </p>

    </div>

    <br>

    <label>
      Material
    </label>

    <select>

      <option>PLA</option>
      <option>PETG</option>
      <option>TPU</option>

    </select>

    <label>
      Color
    </label>

    <select>

      <option>Black</option>
      <option>White</option>
      <option>Red</option>

    </select>

    <label>
      Notes
    </label>

    <textarea
      placeholder="What is this part used for?"
    ></textarea>

    <button class="primary-btn">
      Request Quote
    </button>

  </section>

</body>
</html>
