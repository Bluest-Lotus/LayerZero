<!DOCTYPE html>
<html>
<head>
  <title>Product</title>

  <link rel="stylesheet" href="assets/styles.css">

  <script defer src="assets/app.js"></script>
</head>

<body onload="loadProducts().then(renderProductPage)">

<nav>
  <strong>Layer0</strong>

  <div>
    <a href="index.html">Home</a>
    <a href="catalog.html">Catalog</a>
  </div>
</nav>

<div class="container">

  <h1 id="title"></h1>

  <p id="desc"></p>

  <label>Material</label>
  <select id="material" onchange="updateQuote()"></select>

  <label>Color</label>
  <select id="color" onchange="updateQuote()"></select>

  <label>Quantity</label>
  <input
    id="quantity"
    type="number"
    min="1"
    value="1"
    oninput="updateQuote()"
  >

  <label>Volume (cm³)</label>
  <input
    id="volume"
    type="number"
    min="1"
    value="10"
    oninput="updateQuote()"
  >

  <label>Material Type</label>
  <select id="materialFactor" onchange="updateQuote()">
    <option value="1">PLA</option>
    <option value="1.2">PETG</option>
    <option value="1.4">ABS</option>
    <option value="1.8">Nylon</option>
  </select>

  <label>Shipping Region</label>
  <select id="region" onchange="updateQuote()">
    <option value="canada">Canada</option>
    <option value="usa">USA</option>
    <option value="intl">International</option>
  </select>

  <label>Shipping Speed</label>
  <select id="speed" onchange="updateQuote()">
    <option value="1">Standard</option>
    <option value="1.6">Express</option>
    <option value="2.2">Priority</option>
  </select>

  <h2 id="price">$0.00</h2>

  <p id="productionTime"></p>

  <a id="buy" target="_blank">
    <button>Buy with PayPal</button>
  </a>

  <br><br>

  <button onclick="sendQuoteEmail()">
    Email Quote
  </button>

</div>

</body>
</html>
