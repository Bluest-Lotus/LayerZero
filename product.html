<!DOCTYPE html>
<html>
<head>

  <title>LayerZero Product</title>

  <link
    rel="stylesheet"
    href="./assets/styles.css"
  >

  <script
    defer
    src="./assets/app.js"
  ></script>

</head>

<body onload="loadProducts().then(renderProductPage)">

  <!-- NAV -->

  <nav>

    <div class="logo">
      LayerZero
    </div>

    <div>

      <a href="index.html">
        Home
      </a>

      <a href="storefront.html">
        Storefront
      </a>

      <a href="upload.html">
        Upload
      </a>

      <a href="pricing.html">
        Pricing
      </a>

      <a href="materials.html">
        Materials
      </a>

    </div>

  </nav>

  <!-- PRODUCT -->

  <section class="container">

    <div class="product-layout">

      <!-- IMAGE -->

      <div>

        <img
          id="productImage"
          class="full-product-image"
          src=""
          alt=""
        >

      </div>

      <!-- DETAILS -->

      <div>

        <h1 id="title"></h1>

        <p
          id="desc"
          class="section-subtitle"
        ></p>

        <label>
          Material
        </label>

        <select
          id="material"
          onchange="updateQuote()"
        ></select>

        <label>
          Color
        </label>

        <select
          id="color"
          onchange="updateQuote()"
        ></select>

        <label>
          Quantity
        </label>

        <input
          id="quantity"
          type="number"
          min="1"
          value="1"
          oninput="updateQuote()"
        >

        <label>
          Shipping Region
        </label>

        <select
          id="region"
          onchange="updateQuote()"
        >

          <option value="canada">
            Canada
          </option>

          <option value="usa">
            USA
          </option>

          <option value="intl">
            International
          </option>

        </select>

        <label>
          Shipping Speed
        </label>

        <select
          id="speed"
          onchange="updateQuote()"
        >

          <option value="1">
            Standard
          </option>

          <option value="1.6">
            Express
          </option>

          <option value="2.2">
            Priority
          </option>

        </select>

        <div class="quote-box">

          <p class="quote-label">
            Estimated Total
          </p>

          <h2 id="price">
            $0.00
          </h2>

          <p
            id="productionTime"
            class="quote-time"
          ></p>

        </div>

        <a
          id="buy"
          target="_blank"
        >

          <button class="primary-btn full-btn">

            Buy with PayPal

          </button>

        </a>

      </div>

    </div>

  </section>

  <footer>

    © LayerZero Additive Manufacturing

  </footer>

</body>
</html>
